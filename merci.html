<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Merci - Message envoyé</title>
  <!-- Font Awesome (icônes pro) -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --neon-blue: #00d4ff;
      --neon-purple: #b829ff;
      --neon-pink: #ff006e;
      --dark-bg: #0d0d0d;
      --card-bg: #1a1a1a;
      --text-light: #f0f0f0;
      --text-gray: #b0b0b0;
    }

    body { 
      font-family: 'Poppins', sans-serif; 
      background: var(--dark-bg); 
      color: var(--text-light); 
      overflow-x: hidden;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .bg-animation { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.4; }
    .particle { position: absolute; border-radius: 50%; background: var(--neon-blue); animation: float 20s infinite; }
    @keyframes float {
      0%, 100% { transform: translate(0, 0); }
      25% { transform: translate(100px, -100px); }
      50% { transform: translate(-50px, -200px); }
      75% { transform: translate(-150px, -50px); }
    }

    .success-container {
      text-align: center;
      max-width: 400px;
      padding: 1.5rem;
      background: var(--card-bg);
      border-radius: 20px;
      border: 1px solid rgba(0, 212, 255, 0.2);
      box-shadow: 0 20px 60px rgba(0, 212, 255, 0.2);
      position: relative;
      overflow: hidden;
    }

    .success-container::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 4px;
      background: linear-gradient(90deg, var(--neon-blue), var(--neon-purple), var(--neon-pink));
    }

    .success-icon {
      font-size: 3rem;
      color: var(--neon-blue);
      margin-bottom: 1rem;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.1); opacity: 0.8; }
    }

    .success-title {
      font-size: 1.8rem;
      margin-bottom: 0.6rem;
      background: linear-gradient(135deg, var(--neon-blue), var(--neon-purple));
      -webkit-background-clip: text; 
      -webkit-text-fill-color: transparent; 
      background-clip: text;
      font-weight: bold;
    }

    .success-message {
      font-size: 1rem;
      color: var(--text-gray);
      margin-bottom: 1.5rem;
      line-height: 1.6;
    }

    .btn { 
      padding: 1rem 2.5rem; 
      border: none; 
      border-radius: 8px; 
      font-size: 1rem; 
      cursor: pointer; 
      transition: all 0.3s; 
      text-decoration: none; 
      display: inline-block; 
      font-weight: 600; 
      text-transform: uppercase; 
      letter-spacing: 1px;
      background: linear-gradient(135deg, var(--neon-blue), var(--neon-purple)); 
      color: white; 
      box-shadow: 0 0 30px rgba(0, 212, 255, 0.4);
    }

    .btn:hover { 
      box-shadow: 0 0 50px rgba(0, 212, 255, 0.6); 
      transform: translateY(-3px); 
    }

    .additional-info {
      margin-top: 2rem;
      padding-top: 2rem;
      border-top: 1px solid rgba(0, 212, 255, 0.2);
      color: var(--text-gray);
      font-size: 0.9rem;
    }

    @media (max-width: 768px) {
      .success-container {
        margin: 1rem;
        padding: 2rem;
      }
      .success-title { font-size: 2rem; }
      .success-icon { font-size: 4rem; }
    }
  </style>
</head>
<body>
<div class="bg-animation" id="particles"></div>

<div class="success-container">
  <div class="success-icon">
    <i class="fa-solid fa-check-circle"></i>
  </div>
  
  <h1 class="success-title">Message envoyé avec succès !</h1>
  
  <p class="success-message">
    Merci pour votre message. Je vous répondrai dans les plus brefs délais.<br>
    Votre intérêt pour mon travail est très apprécié.
  </p>
  
  <a href="index.html" class="btn">
    <i class="fa-solid fa-home"></i> Retour à l'accueil
  </a>
  
  <div class="additional-info">
    <p><i class="fa-solid fa-envelope"></i> Vous pouvez aussi me contacter directement : baojonathan95@gmail.com</p>
  </div>
</div>

<script>
  /* ====== PARTICULES ====== */
  const particlesContainer = document.getElementById('particles');
  (function makeParticles(){
    for (let i = 0; i < 20; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      const s = (Math.random()*4+1);
      p.style.width = s+'px';
      p.style.height = s+'px';
      p.style.left = Math.random()*100+'%';
      p.style.top = Math.random()*100+'%';
      p.style.animationDuration = (Math.random()*20+15)+'s';
      p.style.animationDelay = (Math.random()*5)+'s';
      p.style.opacity = (Math.random()*0.5+0.3).toFixed(2);
      p.style.transition = 'opacity .8s ease';
      particlesContainer.appendChild(p);
    }
    setInterval(()=>{
      const kids=[...particlesContainer.children];
      if(!kids.length) return;
      const t = kids[Math.floor(Math.random()*kids.length)];
      t.style.opacity = (Math.random()*0.6+0.2).toFixed(2);
    }, 600);
  })();

  /* ====== Redirection automatique après 10 secondes ====== */
  setTimeout(() => {
    const countdown = document.createElement('div');
    countdown.style.cssText = 'position: fixed; bottom: 20px; right: 20px; background: rgba(0, 212, 255, 0.1); border: 1px solid rgba(0, 212, 255, 0.3); padding: 10px 15px; border-radius: 8px; color: var(--neon-blue); font-size: 0.9rem;';
    countdown.innerHTML = '<i class="fa-solid fa-clock"></i> Redirection automatique dans <span id="countdown">10</span> secondes';
    document.body.appendChild(countdown);
    
    let seconds = 10;
    const timer = setInterval(() => {
      seconds--;
      document.getElementById('countdown').textContent = seconds;
      if (seconds <= 0) {
        clearInterval(timer);
        window.location.href = 'index.html';
      }
    }, 1000);
  }, 1000);
</script>

</body>
</html>
